<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swarmcode Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --green: #3fb950;
    --green-dim: #238636;
    --yellow: #d29922;
    --yellow-dim: #9e6a03;
    --red: #f85149;
    --red-dim: #da3633;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --orange: #f0883e;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  .status-dot.disconnected { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-meta {
    font-size: 13px;
    color: var(--text-muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .team-select {
    font-family: var(--font);
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    outline: none;
  }

  .team-select:hover { border-color: var(--text-dim); }
  .team-select:focus { border-color: var(--blue); }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto auto auto;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 57px);
  }

  .panel {
    background: var(--bg);
    padding: 20px 24px;
    overflow: auto;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title .count {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 8px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Panel: Team Activity */
  #activity {
    grid-column: 1 / -1;
    grid-row: 3;
  }

  .activity-section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
  }

  .activity-section-title:first-of-type { margin-top: 0; }

  .people-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .person-card {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .person-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .person-name {
    font-weight: 600;
    font-size: 14px;
  }

  .person-status {
    font-size: 11px;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .person-status.active {
    background: rgba(63, 185, 80, 0.15);
    color: var(--green);
  }

  .person-status.idle {
    background: rgba(210, 153, 34, 0.15);
    color: var(--yellow);
  }

  .person-status.offline {
    background: rgba(139, 148, 158, 0.1);
    color: var(--text-dim);
  }

  .person-issue {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .person-issue .issue-id {
    font-family: var(--mono);
    color: var(--purple);
  }

  .person-details {
    margin: 6px 0;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .person-details code {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
    background: rgba(255,255,255,0.05);
    padding: 1px 4px;
    border-radius: 3px;
  }

  .detail-label {
    color: var(--text-dim);
    margin-right: 4px;
  }

  .detail-label::after {
    content: ':';
  }

  .person-commit-time {
    font-size: 11px;
    color: var(--text-dim);
  }

  .event-feed {
    max-height: 300px;
    overflow-y: auto;
  }

  .event-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .event-item:last-child { border-bottom: none; }

  .event-icon {
    flex-shrink: 0;
    width: 16px;
    text-align: center;
    font-size: 11px;
  }

  .event-icon.commit { color: var(--green); }
  .event-icon.merge { color: var(--purple); }
  .event-icon.branch { color: var(--blue); }
  .event-icon.status { color: var(--orange); }

  .event-text {
    flex: 1;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .event-text strong { color: var(--text); font-weight: 600; }

  .event-time {
    flex-shrink: 0;
    color: var(--text-dim);
    font-size: 11px;
  }

  /* Panel: Conflict Radar */
  #conflicts { grid-column: 1 / -1; grid-row: 4; }

  .conflict-item {
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
  }

  .conflict-item.high {
    border-left: 3px solid var(--red);
  }

  .conflict-item.low {
    border-left: 3px solid var(--yellow);
  }

  .conflict-file {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .severity-badge {
    font-family: var(--font);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 3px;
  }

  .severity-badge.high {
    background: rgba(248, 81, 73, 0.15);
    color: var(--red);
  }

  .severity-badge.low {
    background: rgba(210, 153, 34, 0.15);
    color: var(--yellow);
  }

  .conflict-branches {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .branch-tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface-hover);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .branch-tag .author {
    color: var(--text-dim);
    margin-left: 4px;
  }

  .conflict-local {
    font-size: 11px;
    color: var(--orange);
    margin-top: 4px;
  }

  .no-conflicts {
    color: var(--green);
    padding: 24px;
    text-align: center;
    font-size: 14px;
  }

  /* Panel: Kanban Board */
  #kanban {
    grid-column: 1 / -1;
    grid-row: 2;
  }

  .kanban-cycle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .kanban-cycle strong { color: var(--text); }

  .kanban-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    min-height: 200px;
  }

  .kanban-column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    max-height: 600px;
    overflow-y: auto;
  }

  .kanban-column-header {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--surface);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .kanban-column-count {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 8px;
    font-size: 11px;
    font-weight: 500;
  }

  .kanban-card {
    display: block;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .kanban-card:hover { border-color: var(--text-dim); }
  .kanban-card:last-child { margin-bottom: 0; }

  .kanban-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .kanban-card-id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--purple);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .priority-dot.urgent { background: var(--red); }
  .priority-dot.high { background: var(--orange); }
  .priority-dot.medium { background: var(--yellow); }
  .priority-dot.low { background: var(--blue); }
  .priority-dot.none { background: var(--text-dim); }

  .kanban-card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .kanban-card-assignee {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .kanban-card-labels {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }

  .kanban-label {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    color: #fff;
  }

  .kanban-card-footer {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .kanban-card-footer .overdue { color: var(--red); }

  .kanban-card-branch {
    font-family: var(--mono);
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .kanban-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 24px 8px;
  }

  /* Panel: Project Context */
  #context {
    grid-column: 1 / -1;
    grid-row: 5;
    max-height: 600px;
  }

  .context-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--border);
  }

  .context-tab {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .context-tab:hover { background: var(--bg); color: var(--text); }
  .context-tab.active {
    background: var(--blue);
    color: #fff;
    font-weight: 600;
  }

  .context-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 32px;
    font-size: 14px;
    line-height: 1.8;
    overflow: auto;
    max-height: 450px;
  }

  .context-content h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 20px 0 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }
  .context-content h2 {
    font-size: 18px;
    font-weight: 600;
    margin: 18px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .context-content h3 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; }
  .context-content h1:first-child, .context-content h2:first-child { margin-top: 0; }
  .context-content p { margin: 10px 0; }
  .context-content ul, .context-content ol { margin: 10px 0; padding-left: 28px; }
  .context-content li { margin: 4px 0; }
  .context-content code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .context-content pre {
    background: var(--bg);
    padding: 16px 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 12px 0;
    border: 1px solid var(--border);
  }
  .context-content pre code { background: none; padding: 0; border: none; }
  /* Override Prism theme to match dashboard dark theme */
  .context-content pre[class*="language-"],
  .context-content code[class*="language-"] {
    background: var(--bg);
    text-shadow: none;
  }
  .context-content a { color: var(--blue); text-decoration: none; }
  .context-content a:hover { text-decoration: underline; }
  .context-content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
  .context-content th, .context-content td {
    border: 1px solid var(--border);
    padding: 8px 14px;
    text-align: left;
    font-size: 13px;
  }
  .context-content th { background: var(--bg); font-weight: 600; }
  .context-content input[type="checkbox"] { margin-right: 6px; }

  .context-content details {
    margin: 12px 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .context-content details summary {
    padding: 10px 16px;
    background: var(--bg);
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .context-content details summary::before {
    content: '▶';
    font-size: 10px;
    transition: transform 0.15s;
  }

  .context-content details[open] summary::before {
    transform: rotate(90deg);
  }

  .context-content details > :not(summary) {
    padding: 0 16px;
  }

  .empty-state {
    color: var(--text-muted);
    text-align: center;
    padding: 32px;
    font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }
    #kanban, #activity, #conflicts, #context {
      grid-column: 1;
      grid-row: auto;
    }
    .kanban-board {
      grid-template-columns: 1fr;
    }
  }
</style>

<header>
  <h1>
    <span class="status-dot" id="statusDot"></span>
    <span id="repoName">swarmcode</span>
  </h1>
  <div class="header-right">
    <select class="team-select" id="teamSelect" style="display:none">
      <option value="">All Teams</option>
    </select>
    <span class="header-meta" id="apiCalls" title="Linear API calls this hour (resets hourly, limit 4,500)">API: 0 / 4,500</span>

  </div>
</header>

<div class="grid">
  <section class="panel" id="activity">
    <div class="panel-title">Team Activity <span class="count" id="activityCount">0</span></div>
    <div class="activity-section-title">People</div>
    <div class="people-grid" id="peopleGrid"></div>
    <div class="activity-section-title">Recent Events</div>
    <div class="event-feed" id="eventFeed"></div>
  </section>

  <section class="panel" id="conflicts">
    <div class="panel-title">Conflict Radar <span class="count" id="conflictCount">0</span></div>
    <div id="conflictContent"></div>
  </section>

  <section class="panel" id="kanban">
    <div class="panel-title">Board <span class="count" id="kanbanCount">0</span></div>
    <div class="kanban-cycle" id="kanbanCycle"></div>
    <div class="kanban-board" id="kanbanBoard"></div>
  </section>

  <section class="panel" id="context">
    <div class="panel-title">Project Context <span class="count" id="contextCount">0</span></div>
    <div class="context-tabs" id="contextTabs"></div>
    <div class="context-content" id="contextContent"></div>
  </section>
</div>

<!-- Simple markdown renderer (no external deps) -->
<script>
function renderMarkdown(md) {
  // Collapse H2 sections by default for long docs (>50 lines)
  const isLong = md.split('\n').length > 50;
  const detailsTag = isLong ? '<details>' : '<details open>';

  let html = md
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="${lang ? 'language-' + lang : ''}">${escHtml(code.trim())}</code></pre>`)
    // Inline code
    .replace(/`([^`]+)`/g, (_, code) => `<code>${escHtml(code)}</code>`)
    // Headers — h2s become collapsible sections
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, `<!--H2_SPLIT-->${detailsTag}<summary>$1</summary>`)
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold & italic
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    // Checkboxes
    .replace(/^- \[x\] (.+)$/gm, '<li><input type="checkbox" checked disabled> $1</li>')
    .replace(/^- \[ \] (.+)$/gm, '<li><input type="checkbox" disabled> $1</li>')
    // Unordered lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Table rows
    .replace(/^\|(.+)\|$/gm, (_, row) => {
      const cells = row.split('|').map(c => c.trim());
      return '<tr>' + cells.map(c =>
        /^[-:]+$/.test(c) ? '' : `<td>${c}</td>`
      ).join('') + '</tr>';
    })
    // Paragraphs (double newline)
    .replace(/\n\n+/g, '</p><p>')
    // Line breaks
    .replace(/\n/g, '<br>');

  // Close open details sections
  const splitParts = html.split('<!--H2_SPLIT-->');
  if (splitParts.length > 1) {
    html = splitParts[0];
    for (let i = 1; i < splitParts.length; i++) {
      if (i > 1) html += '</details>';
      html += splitParts[i];
    }
    html += '</details>';
  }

  // Wrap lists
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  // Wrap tables
  html = html.replace(/(<tr>[\s\S]*?<\/tr>)/g, '<table>$1</table>');
  html = html.replace(/<\/table>\s*<table>/g, '');
  // Remove empty separator rows
  html = html.replace(/<tr><\/tr>/g, '');

  return `<p>${html}</p>`;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function timeAgo(ts) {
  const secs = Math.floor(Date.now() / 1000 - ts);
  if (secs < 60) return 'just now';
  if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
  return `${Math.floor(secs / 86400)}d ago`;
}

function formatDate(ts) {
  return new Date(ts * 1000).toLocaleString();
}

// Linear's dueDate is "YYYY-MM-DD" and cycle endsAt is an ISO datetime at
// UTC midnight. Parsing either with `new Date(str)` treats it as UTC, which
// shifts the calendar date backwards for users west of UTC. Extract the
// Y-M-D parts and build a local Date so the display matches Linear's UI.
function formatLinearDate(str) {
  if (!str) return '';
  const [y, m, d] = str.slice(0, 10).split('-').map(Number);
  if (!y || !m || !d) return '';
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function isPastDueDate(str) {
  if (!str) return false;
  const [y, m, d] = str.slice(0, 10).split('-').map(Number);
  if (!y || !m || !d) return false;
  const due = new Date(y, m - 1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return due < today;
}

// --- Render functions ---

function isBot(name) {
  return /\[bot\]|dependabot/i.test(name);
}

function getPresenceStatus(dev, linearIssues) {
  const now = Date.now() / 1000;
  const lastCommit = dev.last_active || 0;
  const timeSinceCommit = now - lastCommit;

  const activeIssue = linearIssues.find(i =>
    i.statusType === 'started' &&
    !i.status.toLowerCase().includes('review') &&
    i.assignee === dev.name
  );

  if (timeSinceCommit < 1800 || (activeIssue && timeSinceCommit < 7200)) {
    return { status: 'active', issue: activeIssue };
  }
  if (activeIssue) {
    return { status: 'idle', issue: activeIssue };
  }
  return { status: 'offline', issue: null };
}

function renderActivity(activity, linear, statusChanges, newBranches) {
  const issues = (linear && linear.issues) ? linear.issues : [];
  const peopleEl = document.getElementById('peopleGrid');
  const feedEl = document.getElementById('eventFeed');

  const humans = activity.filter(d => !isBot(d.name));
  document.getElementById('activityCount').textContent = humans.length;

  if (humans.length === 0) {
    peopleEl.innerHTML = '<div class="empty-state">No team activity in the last 7 days</div>';
    feedEl.innerHTML = '';
    return;
  }

  const people = humans.map(dev => ({
    ...dev,
    ...getPresenceStatus(dev, issues),
  }));

  const statusOrder = { active: 0, idle: 1, offline: 2 };
  people.sort((a, b) => statusOrder[a.status] - statusOrder[b.status] || b.last_active - a.last_active);

  peopleEl.innerHTML = people.map(p => {
    const dayAgo = Date.now() / 1000 - 86400;
    const commits24h = (p.recent_commits || []).filter(c => c.timestamp > dayAgo).length;
    const featureBranches = (p.active_branches || [])
      .filter(b => !b.includes('/master') && !b.includes('/main') && !b.includes('/HEAD'))
      .map(b => b.replace(/^origin\//, ''));
    const branchDisplay = featureBranches.length > 0
      ? featureBranches.slice(0, 2).map(b => `<code>${escHtml(b)}</code>`).join(', ')
        + (featureBranches.length > 2 ? ` +${featureBranches.length - 2}` : '')
      : '<span style="opacity:0.5">none</span>';
    const areas = (p.work_areas || []).slice(0, 3).map(a => escHtml(a)).join(', ');

    return `
    <div class="person-card">
      <div class="person-header">
        <span class="person-name">${escHtml(p.name)}</span>
        <span class="person-status ${p.status}">${p.status}</span>
      </div>
      <div class="person-issue">
        ${p.issue
          ? `<span class="issue-id">${escHtml(p.issue.identifier)}</span>: ${escHtml(p.issue.title)}`
          : '<span style="opacity:0.5">No active issue</span>'}
      </div>
      <div class="person-details">
        <div class="person-detail"><span class="detail-label">Branches</span> ${branchDisplay}</div>
        ${areas ? `<div class="person-detail"><span class="detail-label">Working in</span> ${areas}</div>` : ''}
        <div class="person-detail"><span class="detail-label">Last 24h</span> ${commits24h} commit${commits24h !== 1 ? 's' : ''}</div>
      </div>
      <div class="person-commit-time">Last commit: ${p.last_active ? timeAgo(p.last_active) : 'none'}</div>
    </div>
  `}).join('');

  const events = [];

  for (const dev of humans) {
    for (const commit of (dev.recent_commits || [])) {
      const isMerge = /^Merge (branch|pull request)/i.test(commit.message);
      events.push({
        type: isMerge ? 'merge' : 'commit',
        actor: dev.name,
        text: isMerge
          ? `merged into main — "${escHtml(commit.message.slice(0, 60))}"`
          : `pushed <code>${escHtml(commit.hash)}</code> — "${escHtml(commit.message.slice(0, 60))}"`,
        timestamp: commit.timestamp,
      });
    }
  }

  for (const change of (statusChanges || [])) {
    events.push({
      type: 'status',
      actor: change.actor || 'Someone',
      text: `<strong>${escHtml(change.issueIdentifier)}</strong> moved to <strong>${escHtml(change.toStatus)}</strong>`,
      timestamp: change.timestamp,
    });
  }

  for (const branch of (newBranches || [])) {
    events.push({
      type: 'branch',
      actor: branch.author,
      text: `created branch <code>${escHtml(branch.name)}</code>`,
      timestamp: branch.timestamp,
    });
  }

  // Filter to last 48 hours, sort newest first, cap at 25
  const cutoff48h = Date.now() / 1000 - 48 * 3600;
  const filtered = events.filter(e => e.timestamp > cutoff48h);
  filtered.sort((a, b) => b.timestamp - a.timestamp);
  const recentEvents = filtered.slice(0, 25);

  const iconMap = {
    commit: '<span class="event-icon commit">&#9679;</span>',
    merge: '<span class="event-icon merge">&#8634;</span>',
    branch: '<span class="event-icon branch">&#9745;</span>',
    status: '<span class="event-icon status">&#8594;</span>',
  };

  feedEl.innerHTML = recentEvents.length
    ? recentEvents.map(e => `
      <div class="event-item">
        ${iconMap[e.type] || ''}
        <span class="event-text"><strong>${escHtml(e.actor)}</strong> ${e.text}</span>
        <span class="event-time">${timeAgo(e.timestamp)}</span>
      </div>
    `).join('')
    : '<div class="empty-state">No recent events</div>';
}

function renderConflicts(data) {
  const el = document.getElementById('conflictContent');
  document.getElementById('conflictCount').textContent = data.conflicts.length;

  if (data.conflicts.length === 0) {
    el.innerHTML = '<div class="no-conflicts">No conflicts detected</div>';
    return;
  }

  el.innerHTML = data.conflicts.map(c => `
    <div class="conflict-item ${c.severity}">
      <div class="conflict-file">
        ${escHtml(c.file)}
        <span class="severity-badge ${c.severity}">${c.severity}</span>
      </div>
      <div class="conflict-branches">
        ${c.branches.map(b => `
          <span class="branch-tag">
            ${escHtml(b.branch.replace(/^origin\//, ''))}
            <span class="author">${escHtml(b.author)}</span>
          </span>
        `).join('')}
      </div>
      ${c.local ? '<div class="conflict-local">Also modified locally</div>' : ''}
    </div>
  `).join('');
}

const PRIORITY_NAMES = { 1: 'urgent', 2: 'high', 3: 'medium', 4: 'low' };

function getKanbanColumn(issue) {
  if (issue.statusType === 'completed') return 'done';
  if (issue.statusType === 'started') {
    if (issue.status.toLowerCase().includes('review')) return 'review';
    return 'progress';
  }
  return 'backlog';
}

function renderKanbanCard(issue) {
  const priorityClass = PRIORITY_NAMES[issue.priority] || 'none';
  const isOverdue = isPastDueDate(issue.dueDate);
  const labels = issue.labelDetails || [];

  const dueDateStr = formatLinearDate(issue.dueDate);

  return `
    <a class="kanban-card" href="${escHtml(issue.url)}" target="_blank" title="${escHtml(issue.title)}">
      <div class="kanban-card-header">
        <span class="kanban-card-id">
          <span class="priority-dot ${priorityClass}"></span>
          ${escHtml(issue.identifier)}
        </span>
      </div>
      <div class="kanban-card-title">${escHtml(issue.title)}</div>
      <div class="kanban-card-assignee">${issue.assignee ? escHtml(issue.assignee) : '<span style="opacity:0.5">Unassigned</span>'}</div>
      ${labels.length ? `<div class="kanban-card-labels">${labels.map(l =>
        `<span class="kanban-label" style="background:${escHtml(l.color)}">${escHtml(l.name)}</span>`
      ).join('')}</div>` : ''}
      <div class="kanban-card-footer">
        ${dueDateStr ? `<span class="${isOverdue ? 'overdue' : ''}">Due: ${dueDateStr}</span>` : ''}
        ${issue.estimate ? `<span>${issue.estimate}pts</span>` : ''}
        ${issue.branchName ? `<span class="kanban-card-branch">${escHtml(issue.branchName)}</span>` : ''}
      </div>
    </a>
  `;
}

function renderKanban(data) {
  const board = document.getElementById('kanbanBoard');
  const cycleEl = document.getElementById('kanbanCycle');

  if (!data || !data.issues || data.issues.length === 0) {
    document.getElementById('kanbanCount').textContent = '0';
    board.innerHTML = '<div class="kanban-empty" style="grid-column:1/-1;padding:48px">No issues found</div>';
    cycleEl.innerHTML = '';
    return;
  }

  document.getElementById('kanbanCount').textContent = data.issues.length;

  if (data.cycle) {
    const endDate = formatLinearDate(data.cycle.endsAt);
    cycleEl.innerHTML = `<div class="kanban-cycle"><strong>${escHtml(data.cycle.name || 'Current Cycle')}</strong>${endDate ? ` — ends ${endDate}` : ''}</div>`;
  } else {
    cycleEl.innerHTML = '';
  }

  const sorted = [...data.issues].sort((a, b) => {
    const pa = a.priority || 5;
    const pb = b.priority || 5;
    if (pa !== pb) return pa - pb;
    // Secondary sort: most recently updated first
    return (b.updatedAt || '').localeCompare(a.updatedAt || '');
  });

  const columns = {
    backlog: sorted.filter(i => getKanbanColumn(i) === 'backlog'),
    progress: sorted.filter(i => getKanbanColumn(i) === 'progress'),
    review: sorted.filter(i => getKanbanColumn(i) === 'review'),
    done: sorted.filter(i => getKanbanColumn(i) === 'done'),
  };

  function renderColumn(title, issues) {
    return `
      <div class="kanban-column">
        <div class="kanban-column-header">
          ${title}
          <span class="kanban-column-count">${issues.length}</span>
        </div>
        ${issues.length ? issues.map(renderKanbanCard).join('') : '<div class="kanban-empty">No issues</div>'}
      </div>
    `;
  }

  board.innerHTML =
    renderColumn('Backlog', columns.backlog) +
    renderColumn('In Progress', columns.progress) +
    renderColumn('In Review', columns.review) +
    renderColumn('Done', columns.done);
}

let activeContextFile = 0;

function renderContext(data) {
  const tabsEl = document.getElementById('contextTabs');
  const contentEl = document.getElementById('contextContent');
  document.getElementById('contextCount').textContent = data.files.length;

  if (data.files.length === 0) {
    tabsEl.innerHTML = '';
    contentEl.innerHTML = '<div class="empty-state">No project docs found (README.md, PLAN.md, specs/, docs/)</div>';
    return;
  }

  if (activeContextFile >= data.files.length) activeContextFile = 0;

  tabsEl.innerHTML = data.files.map((f, i) => `
    <button class="context-tab ${i === activeContextFile ? 'active' : ''}"
            onclick="switchContextTab(${i})">${escHtml(f.path)}</button>
  `).join('');

  contentEl.innerHTML = renderMarkdown(data.files[activeContextFile].content);
  if (window.Prism) Prism.highlightAllUnder(contentEl);
}

function switchContextTab(i) {
  activeContextFile = i;
  if (window._lastData) renderContext(window._lastData.context);
}

// --- Data loading ---

function render(data) {
  window._lastData = data;
  document.getElementById('repoName').textContent = data.repo;
  document.getElementById('lastUpdate').textContent =
    'Updated ' + new Date(data.timestamp).toLocaleTimeString();
  document.getElementById('apiCalls').textContent =
    'API: ' + (data.linearApiCalls ?? 0).toLocaleString() + ' / 4,500';

  renderKanban(data.linear);
  renderActivity(data.activity, data.linear, data.statusChanges, data.newBranches);
  renderConflicts(data.conflicts);
  renderContext(data.context);
}

let currentEventSource = null;

function getSelectedTeam() {
  return localStorage.getItem('swarmcode-dashboard-team') || '';
}

function populateTeams(teams) {
  const select = document.getElementById('teamSelect');
  if (!teams || teams.length === 0) {
    select.style.display = 'none';
    return;
  }

  select.style.display = '';
  const saved = getSelectedTeam();

  // Keep "All Teams" option, replace the rest
  select.innerHTML = '<option value="">All Teams</option>' +
    teams.map(t => `<option value="${escHtml(t.key)}" ${t.key === saved ? 'selected' : ''}>${escHtml(t.name)} (${escHtml(t.key)})</option>`).join('');
}

function connect() {
  if (currentEventSource) {
    currentEventSource.close();
  }

  const dot = document.getElementById('statusDot');
  const team = getSelectedTeam();
  const url = team ? `/events?team=${encodeURIComponent(team)}` : '/events';
  const es = new EventSource(url);
  currentEventSource = es;

  es.onmessage = (event) => {
    dot.classList.remove('disconnected');
    try {
      const data = JSON.parse(event.data);
      populateTeams(data.teams);
      render(data);
    } catch (e) {
      console.error('Failed to parse SSE data:', e);
    }
  };

  es.onerror = () => {
    dot.classList.add('disconnected');
    document.getElementById('lastUpdate').textContent = 'Reconnecting...';
  };
}

document.getElementById('teamSelect').addEventListener('change', (e) => {
  const value = e.target.value;
  localStorage.setItem('swarmcode-dashboard-team', value);
  connect(); // reconnect SSE with new team param
});

connect();
</script>
